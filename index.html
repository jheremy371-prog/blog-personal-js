<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Blog Personal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h2>📘 Mi Blog</h2>
            <div>
                <span id="userNameDisplay"></span>
                <button onclick="logout()" class="btn-delete" style="width: auto; margin-left: 10px;">Cerrar Sesión</button>
                <button onclick="toggleTheme()" style="width: auto; background: var(--text-muted); margin-left: 10px;">🌓 Tema</button>
            </div>
        </header>
        
        <form id="blogForm">
            <input type="hidden" id="postId">
            <input type="text" id="postTitle" placeholder="Título de la publicación" required>
            <textarea id="postContent" placeholder="Escribe tu contenido aquí..." rows="4" required></textarea>
            <button type="submit" id="submitBtn">Publicar</button>
        </form>

        <hr style="margin: 20px 0;">

        <input type="text" id="searchInput" class="search-bar" placeholder="Buscar publicaciones por título o contenido...">

        <h3>Tus Publicaciones</h3>
        <div id="postsList"></div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/blog.js"></script>
</body>
</html>
